# Aptiro frontend — nginx serving the Vite build.
# /api/* is reverse-proxied to the backend container inside the compose
# network. Anything else falls back to index.html so the React Router
# client-side routes resolve.

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Gzip text assets — small but free win.
  gzip on;
  gzip_types text/plain text/css application/json application/javascript
             application/xml text/javascript image/svg+xml;
  gzip_min_length 256;

  # Cache hashed Vite assets aggressively (file names include a hash).
  location /assets/ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Never cache the entry HTML — it references the hashed assets.
  location = /index.html {
    add_header Cache-Control "no-store, must-revalidate";
  }

  # Reverse-proxy the API. `backend` is the service name in compose.
  location /api/ {
    proxy_pass http://backend:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }

  # SPA fallback — every other path is a React Router route.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
