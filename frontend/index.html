<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Aptiro — evidence-backed job applications</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{
  --bg:#0f1115;--panel:#171a21;--panel2:#1d2129;--line:#2a2f3a;
  --ink:#e8eaf0;--sub:#9aa3b2;--accent:#5b8cff;--accent2:#7c5cff;
  --blue:#3b82f6;--purple:#8b5cf6;--green:#22c55e;--orange:#f59e0b;--red:#ef4444;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);
  font:14px/1.5 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
a{color:var(--accent)}
.app{display:flex;min-height:100vh}
.nav{width:208px;background:var(--panel);border-right:1px solid var(--line);
  padding:18px 12px;position:sticky;top:0;height:100vh}
.brand{font-weight:800;font-size:18px;letter-spacing:.04em;padding:4px 8px 16px}
.brand small{display:block;font-weight:500;font-size:11px;color:var(--sub);
  letter-spacing:.02em;margin-top:3px}
.nav button{display:block;width:100%;text-align:left;background:none;border:0;
  color:var(--sub);padding:9px 10px;border-radius:8px;cursor:pointer;font-size:13px}
.nav button:hover{background:var(--panel2);color:var(--ink)}
.nav button.on{background:var(--accent);color:#fff}
.main{flex:1;padding:26px 32px;max-width:1080px}
h1{font-size:21px;margin:0 0 4px}
h2{font-size:15px;margin:22px 0 10px}
.sub{color:var(--sub);font-size:12.5px;margin:0 0 16px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:12px;
  padding:16px;margin-bottom:14px}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
@media(max-width:900px){.grid3{grid-template-columns:1fr}}
label.f{display:block;font-size:12px;color:var(--sub);margin:10px 0 4px}
input,textarea,select{width:100%;background:var(--panel2);border:1px solid var(--line);
  color:var(--ink);border-radius:8px;padding:8px 10px;font:inherit}
textarea{min-height:120px;resize:vertical}
button.btn{background:var(--accent);color:#fff;border:0;border-radius:8px;
  padding:8px 14px;cursor:pointer;font:inherit;font-weight:600}
button.btn.sec{background:var(--panel2);color:var(--ink);border:1px solid var(--line)}
button.btn.ghost{background:none;border:1px solid var(--line);color:var(--sub)}
button.btn:disabled{opacity:.5;cursor:not-allowed}
button.mini{font-size:11.5px;padding:5px 9px}
.pill{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11px;
  font-weight:700;color:#fff}
.dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:6px;
  vertical-align:middle}
.bl-blue{background:var(--blue)}.bl-purple{background:var(--purple)}
.bl-green{background:var(--green)}.bl-orange{background:var(--orange)}
.bl-red{background:var(--red)}
.tag{font-size:10.5px;color:var(--sub);background:var(--panel2);
  border:1px solid var(--line);border-radius:6px;padding:1px 7px;margin:0 4px 4px 0;
  display:inline-block}
.snip{font-size:12px;color:var(--sub);border-left:3px solid var(--line);
  padding:4px 0 4px 10px;margin:6px 0}
.kv{display:flex;justify-content:space-between;font-size:12.5px;padding:3px 0;
  border-bottom:1px dashed var(--line)}
.bar{height:7px;background:var(--panel2);border-radius:4px;overflow:hidden;margin-top:3px}
.bar i{display:block;height:100%;background:var(--accent)}
.note{font-size:12px;color:var(--sub);background:var(--panel2);
  border:1px solid var(--line);border-radius:8px;padding:10px;margin-top:10px}
.toast{position:fixed;right:18px;bottom:18px;background:var(--panel2);
  border:1px solid var(--line);padding:11px 15px;border-radius:10px;font-size:13px;
  max-width:360px;box-shadow:0 8px 30px rgba(0,0,0,.4)}
.spin{color:var(--sub);padding:30px;text-align:center}
.sec-h{font-size:11px;text-transform:uppercase;letter-spacing:.08em;
  color:var(--sub);margin:16px 0 6px}
hr{border:0;border-top:1px solid var(--line);margin:14px 0}
code{background:var(--panel2);padding:1px 5px;border-radius:5px;font-size:12px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useRef} = React;
const API = (window.APTIRO_API || "http://localhost:8000") + "/api";

let _TOKEN = null;
try { _TOKEN = window.localStorage.getItem("aptiro_token") || null; }
catch(e) { _TOKEN = null; }
function setToken(t){
  _TOKEN = t || null;
  try {
    if(t) window.localStorage.setItem("aptiro_token", t);
    else window.localStorage.removeItem("aptiro_token");
  } catch(e) {}
}

async function api(path, opts={}) {
  const headers = {"Content-Type":"application/json",
                   ...(opts.headers||{})};
  if(_TOKEN) headers["Authorization"] = "Bearer " + _TOKEN;
  const r = await fetch(API+path, {...opts, headers});
  if(r.status===204) return null;
  const txt = await r.text();
  let data; try{ data = txt ? JSON.parse(txt) : null; }catch(e){ data = txt; }
  if(!r.ok){ const e=new Error((data && data.detail) || ("HTTP "+r.status));
    e.status=r.status; throw e; }
  return data;
}
const PCOL = {blue:"bl-blue",purple:"bl-purple",green:"bl-green",
  orange:"bl-orange",red:"bl-red"};
const PHEX = {blue:"#3b82f6",purple:"#8b5cf6",green:"#22c55e",
  orange:"#f59e0b",red:"#ef4444"};

function Prov({color,label}){
  return <span><span className={"dot "+(PCOL[color]||"bl-red")}></span>
    <span style={{fontSize:11.5,color:"var(--sub)"}}>{label||color}</span></span>;
}

/* ---------------- Dashboard ---------------- */
function Dashboard({go,notify}){
  const [o,setO]=useState(null); const [h,setH]=useState(null);
  useEffect(()=>{ (async()=>{
    try{ setO(await api("/onboarding")); setH(await api("/health")); }
    catch(e){ notify(e.message); } })(); },[]);
  if(!o||!h) return <div className="spin">Loading…</div>;
  return <div>
    <h1>Aptiro</h1>
    <p className="sub">Every claim and every exported line traces back to
      approved evidence. Nothing is fabricated; nothing is auto-submitted.</p>
    <div className="card">
      <h2 style={{marginTop:0}}>Getting started — {o.completed}/{o.total}</h2>
      {o.steps.map(s=>
        <div key={s.key} className="kv">
          <span>{s.done?"✓":"○"} {s.label}</span>
          <span style={{color:s.done?"var(--green)":"var(--sub)"}}>
            {s.done?"done":"todo"}</span>
        </div>)}
      {o.next_step && <div className="note">Next: {o.next_step}</div>}
    </div>
    <div className="grid3">
      <div className="card"><div className="sec-h">Provenance legend</div>
        <Prov color="blue" label="grounded résumé truth"/><br/>
        <Prov color="purple" label="profile-derived"/><br/>
        <Prov color="green" label="public context"/><br/>
        <Prov color="orange" label="AI-suggested (connective)"/><br/>
        <Prov color="red" label="unsupported — never exported"/>
      </div>
      <div className="card"><div className="sec-h">Status</div>
        <div className="kv"><span>Slice</span><span>{h.slice}</span></div>
        <div className="kv"><span>AI provider</span><span>{h.providers.ai}</span></div>
        <div className="kv"><span>Ingestion</span>
          <span>{h.ingestion_formats.join(", ")}</span></div>
        <div className="kv"><span>Export</span>
          <span>{h.export_formats.join(", ")}</span></div>
      </div>
      <div className="card"><div className="sec-h">Flow</div>
        <p className="sub" style={{margin:0}}>Vault → Strategy → Jobs →
          Matches → Package → Export. Use the buttons below.</p>
        <div className="row" style={{marginTop:10}}>
          <button className="btn mini" onClick={()=>go("vault")}>Profile Vault</button>
          <button className="btn mini sec" onClick={()=>go("packages")}>Packages</button>
        </div>
      </div>
    </div>
  </div>;
}

/* ---------------- Profile Vault (with real upload) ---------------- */
function Vault({notify}){
  const [sources,setSources]=useState([]); const [claims,setClaims]=useState([]);
  const [sel,setSel]=useState("all"); const [load,setLoad]=useState(true);
  const [text,setText]=useState(""); const [stype,setStype]=useState("resume");
  const [edit,setEdit]=useState(null); const [draft,setDraft]=useState("");
  const [busy,setBusy]=useState(false); const fileRef=useRef();

  const refresh=useCallback(async()=>{
    try{ setSources(await api("/sources")); setClaims(await api("/claims")); }
    catch(e){ notify(e.message); } finally{ setLoad(false); }
  },[]);
  useEffect(()=>{ refresh(); },[]);

  async function pasteSource(){
    if(text.trim().length<20){ notify("Paste a longer résumé/profile."); return; }
    setBusy(true);
    try{ await api("/sources",{method:"POST",body:JSON.stringify(
      {source_type:stype,label:stype+" (pasted)",raw_text:text})});
      setText(""); notify("Source added — claims extracted with provenance");
      refresh();
    }catch(e){ notify(e.message); } finally{ setBusy(false); }
  }
  async function uploadFile(e){
    const f=e.target.files && e.target.files[0]; if(!f) return;
    setBusy(true);
    try{
      const fd=new FormData(); fd.append("file",f);
      const r=await fetch(API+"/sources/upload?source_type="+stype,
        {method:"POST",body:fd});
      const d=await r.json();
      if(!r.ok) throw new Error(d.detail||("HTTP "+r.status));
      notify("Uploaded "+f.name+" — "+d.claim_count+" claims extracted");
      refresh();
    }catch(e){ notify(e.message); }
    finally{ setBusy(false); if(fileRef.current) fileRef.current.value=""; }
  }
  async function setStatus(c,status){
    try{ await api("/claims/"+c.id,{method:"PATCH",
      body:JSON.stringify({approval_status:status})});
      refresh();
    }catch(e){ notify(e.message); }
  }
  async function saveEdit(c){
    try{ await api("/claims/"+c.id,{method:"PATCH",
      body:JSON.stringify({claim_text:draft})});
      setEdit(null); notify("Claim text updated"); refresh();
    }catch(e){ notify(e.message); }
  }
  async function delSource(s){
    if(!confirm("Delete source and all its claims + evidence?")) return;
    try{ await api("/sources/"+s.id,{method:"DELETE"});
      notify("Source deleted (claims + evidence cascaded)"); refresh();
    }catch(e){ notify(e.message); }
  }

  if(load) return <div className="spin">Loading…</div>;
  const shown = sel==="all"?claims:claims.filter(c=>c.source_id===sel);
  const S = {pending:"var(--sub)",approved:"var(--green)",
    rejected:"var(--red)",do_not_use:"var(--red)",edited:"var(--orange)"};

  return <div>
    <h1>Profile Vault</h1>
    <p className="sub">Upload or paste a résumé/profile. Every extracted
      claim keeps its source snippet, section, confidence and an explicit
      approval gate. Rejected / do-not-use claims turn <b
      style={{color:"var(--red)"}}>red</b> and can never be exported.</p>

    <div className="grid3">
      <div className="card">
        <div className="sec-h">1 · Add a source</div>
        <label className="f">Source type</label>
        <select value={stype} onChange={e=>setStype(e.target.value)}>
          <option value="resume">Résumé (grounded · blue)</option>
          <option value="linkedin">LinkedIn export (profile · purple)</option>
          <option value="profile_text">Profile text (profile · purple)</option>
          <option value="public_url">Public context (green)</option>
        </select>
        <label className="f">Upload PDF · DOCX · TXT · Markdown</label>
        <input ref={fileRef} type="file" accept=".pdf,.docx,.txt,.md,.markdown"
          onChange={uploadFile} disabled={busy}/>
        <div style={{textAlign:"center",color:"var(--sub)",
          fontSize:11,margin:"8px 0"}}>— or paste —</div>
        <textarea placeholder="Paste résumé / profile text…"
          value={text} onChange={e=>setText(e.target.value)}/>
        <button className="btn" style={{marginTop:8}} disabled={busy}
          onClick={pasteSource}>Extract claims</button>
      </div>

      <div className="card">
        <div className="sec-h">Sources</div>
        <button className={"btn ghost mini"+(sel==="all"?" ":"")}
          style={{marginBottom:6,width:"100%"}}
          onClick={()=>setSel("all")}>All claims ({claims.length})</button>
        {sources.map(s=>
          <div key={s.id} className="kv">
            <span style={{cursor:"pointer"}} onClick={()=>setSel(s.id)}>
              {s.label} <span className="tag">{s.source_type}</span>
              {s.parse_meta && s.parse_meta.format &&
                <span className="tag">{s.parse_meta.format}
                  {s.parse_meta.pages?(" · "+s.parse_meta.pages+"p"):""}</span>}
            </span>
            <span>
              <b>{s.claim_count}</b>
              <button className="btn ghost mini" style={{marginLeft:8}}
                onClick={()=>delSource(s)}>✕</button>
            </span>
          </div>)}
        {!sources.length && <p className="sub">No sources yet.</p>}
      </div>

      <div className="card">
        <div className="sec-h">Approval summary</div>
        {["approved","pending","rejected","do_not_use"].map(st=>
          <div key={st} className="kv"><span>{st}</span>
            <b style={{color:S[st]}}>
              {claims.filter(c=>c.approval_status===st).length}</b></div>)}
        <div className="note">Only approved, supported claims feed packages
          and exports. This is the trust gate.</div>
      </div>
    </div>

    <h2>Claims {sel!=="all" && "· filtered"}</h2>
    {shown.map(c=>
      <div className="card" key={c.id} style={{borderLeft:"4px solid "+
        (PHEX[c.provenance_color]||"#ef4444")}}>
        <div className="row" style={{justifyContent:"space-between"}}>
          <Prov color={c.provenance_color} label={c.provenance_category}/>
          <span style={{fontSize:11.5,color:S[c.approval_status]}}>
            {c.approval_status} · conf {Math.round(c.confidence*100)}%</span>
        </div>
        {edit===c.id
          ? <div style={{marginTop:8}}>
              <textarea value={draft} onChange={e=>setDraft(e.target.value)}/>
              <div className="row" style={{marginTop:6}}>
                <button className="btn mini" onClick={()=>saveEdit(c)}>Save</button>
                <button className="btn mini sec"
                  onClick={()=>setEdit(null)}>Cancel</button>
              </div>
            </div>
          : <p style={{margin:"8px 0"}}>{c.claim_text}</p>}
        <div>
          {c.company && <span className="tag">{c.role} @ {c.company}
            {c.date_range?(" · "+c.date_range):""}</span>}
          {(c.metrics||[]).map((m,i)=><span key={i} className="tag">📊 {m}</span>)}
          {(c.skills||[]).slice(0,6).map((s,i)=>
            <span key={"s"+i} className="tag">{s}</span>)}
        </div>
        {(c.source_refs||[]).map((r,i)=>
          <div className="snip" key={i}>“{r.snippet}”
            <span className="tag" style={{marginLeft:6}}>{r.section}
              {r.page?(" · p"+r.page):""}</span></div>)}
        <div className="row" style={{marginTop:8}}>
          <button className="btn mini" disabled={c.approval_status==="approved"}
            onClick={()=>setStatus(c,"approved")}>Approve</button>
          <button className="btn mini sec"
            onClick={()=>{setEdit(c.id);setDraft(c.claim_text);}}>Edit</button>
          <button className="btn ghost mini"
            onClick={()=>setStatus(c,"rejected")}>Reject</button>
          <button className="btn ghost mini"
            onClick={()=>setStatus(c,"do_not_use")}>Do-not-use</button>
        </div>
      </div>)}
    {!shown.length && <p className="sub">No claims — add a source above.</p>}
  </div>;
}

/* ---------------- Strategy ---------------- */
function Strategy({notify}){
  const [s,setS]=useState(null);
  useEffect(()=>{ (async()=>{
    try{ setS(await api("/strategy")); }catch(e){ notify(e.message); } })(); },[]);
  if(!s) return <div className="spin">Loading…</div>;
  const set=(k,v)=>setS({...s,[k]:v});
  const wsum = Object.values(s.weights||{}).reduce((a,b)=>a+(+b||0),0);
  async function save(){
    try{ const r=await api("/strategy",{method:"PUT",body:JSON.stringify({
      name:s.name,target_roles:s.target_roles,region:s.region,
      work_mode:s.work_mode,salary_min:s.salary_min,salary_max:s.salary_max,
      aggressiveness:s.aggressiveness,weights:s.weights,
      include_companies:s.include_companies,exclude_companies:s.exclude_companies,
      targeting_notes:s.targeting_notes})});
      setS(r); notify("Strategy saved");
    }catch(e){ notify(e.message); }
  }
  const arr=(v)=>v?v.join(", "):"";
  const toArr=(v)=>v.split(",").map(x=>x.trim()).filter(Boolean);
  return <div>
    <h1>Strategy</h1>
    <p className="sub">Targeting + explainable scoring weights. The matcher
      uses these and shows the reason for every component.</p>
    <div className="card">
      <div className="grid3">
        <div><label className="f">Name</label>
          <input value={s.name||""} onChange={e=>set("name",e.target.value)}/></div>
        <div><label className="f">Work mode</label>
          <select value={s.work_mode} onChange={e=>set("work_mode",e.target.value)}>
            {["any","remote","hybrid","onsite"].map(x=>
              <option key={x} value={x}>{x}</option>)}</select></div>
        <div><label className="f">Aggressiveness</label>
          <select value={s.aggressiveness}
            onChange={e=>set("aggressiveness",e.target.value)}>
            {["conservative","balanced","aggressive"].map(x=>
              <option key={x} value={x}>{x}</option>)}</select></div>
      </div>
      <label className="f">Target roles (comma-separated)</label>
      <input value={arr(s.target_roles)}
        onChange={e=>set("target_roles",toArr(e.target.value))}/>
      <div className="grid3">
        <div><label className="f">Region</label>
          <input value={s.region||""} onChange={e=>set("region",e.target.value)}/></div>
        <div><label className="f">Salary min</label>
          <input type="number" value={s.salary_min||""}
            onChange={e=>set("salary_min",+e.target.value||null)}/></div>
        <div><label className="f">Salary max</label>
          <input type="number" value={s.salary_max||""}
            onChange={e=>set("salary_max",+e.target.value||null)}/></div>
      </div>
      <label className="f">Exclude companies (comma-separated)</label>
      <input value={arr(s.exclude_companies)}
        onChange={e=>set("exclude_companies",toArr(e.target.value))}/>
      <label className="f">Targeting notes</label>
      <textarea value={s.targeting_notes||""}
        onChange={e=>set("targeting_notes",e.target.value)}/>
      <div className="sec-h" style={{marginTop:16}}>
        Scoring weights (sum {wsum})</div>
      <div className="grid3">
        {Object.keys(s.weights||{}).map(k=>
          <div key={k}><label className="f">{k}</label>
            <input type="number" value={s.weights[k]}
              onChange={e=>set("weights",{...s.weights,[k]:+e.target.value})}/></div>)}
      </div>
      <button className="btn" style={{marginTop:14}} onClick={save}>Save strategy</button>
    </div>
  </div>;
}

/* ---------------- Jobs ---------------- */
function Jobs({notify}){
  const [jobs,setJobs]=useState([]); const [jd,setJd]=useState("");
  const [url,setUrl]=useState(""); const [busy,setBusy]=useState(false);
  const refresh=async()=>{ try{ setJobs(await api("/jobs")); }
    catch(e){ notify(e.message); } };
  useEffect(()=>{ refresh(); },[]);
  async function imp(){
    if(jd.trim().length<20){ notify("Paste a job description."); return; }
    setBusy(true);
    try{ const r=await api("/jobs",{method:"POST",
      body:JSON.stringify({description_text:jd})});
      setJd(""); notify(r.deduplicated?
        "Already imported — showing the existing job (deduplicated)":
        "Job imported & normalized"); refresh();
    }catch(e){ notify(e.message); } finally{ setBusy(false); }
  }
  async function impUrl(){
    if(!/^https?:\/\//i.test(url.trim())){
      notify("Enter a public posting URL (http/https)."); return; }
    setBusy(true);
    try{ const r=await api("/jobs/import-url",{method:"POST",
      body:JSON.stringify({url:url.trim()})});
      setUrl(""); notify(r.deduplicated?
        "Already imported — showing the existing job (deduplicated)":
        "Fetched & imported from URL"); refresh();
    }catch(e){ notify(e.message); } finally{ setBusy(false); }
  }
  async function fetchJobs(){
    setBusy(true);
    try{ await api("/job-sources/fetch",{method:"POST",
      body:JSON.stringify({provider:"remotive"})});
      notify("Fetched sample jobs (mock provider)"); refresh();
    }catch(e){ notify(e.message); } finally{ setBusy(false); }
  }
  async function archive(id){
    try{ await api("/jobs/"+id+"/archive",{method:"POST"});
      notify("Job archived"); refresh();
    }catch(e){ notify(e.message); }
  }
  return <div>
    <h1>Jobs</h1>
    <p className="sub">Paste a description, or import from a public
      posting URL you supply. URL import fetches only that one page —
      no crawling, no LinkedIn/auth-walled sites, robots-respected.</p>
    <div className="card">
      <div className="row">
        <button className="btn sec" disabled={busy}
          onClick={fetchJobs}>Fetch sample jobs</button>
      </div>
      <label className="f">Import from a posting URL</label>
      <div className="row">
        <input value={url} onChange={e=>setUrl(e.target.value)}
          placeholder="https://company.com/careers/senior-pm"
          style={{flex:1}}/>
        <button className="btn sec" disabled={busy}
          onClick={impUrl}>Fetch &amp; import</button>
      </div>
      <label className="f" style={{marginTop:10}}>Or paste a job
        description</label>
      <textarea value={jd} onChange={e=>setJd(e.target.value)}
        placeholder="Title: ...\nCompany: ...\nRequired\n- requirement\nNice to have\n- bonus"/>
      <button className="btn" style={{marginTop:8}} disabled={busy}
        onClick={imp}>Import job</button>
    </div>
    {jobs.map(j=>{ const sr=j.structured_requirements||{};
      return <div className="card" key={j.id}>
        <div className="row" style={{justifyContent:"space-between"}}>
          <b>{j.title} — {j.company}</b>
          <button className="btn ghost mini"
            onClick={()=>archive(j.id)}>Archive</button>
        </div>
        <div>
          <span className="tag">{j.location||"—"}</span>
          <span className="tag">{j.work_mode}</span>
          {j.source && <span className="tag">{j.source}</span>}
          {j.source_url && <a className="tag" href={j.source_url}
            target="_blank" rel="noreferrer">source ↗</a>}
        </div>
        {!!(sr.must_have||[]).length && <div style={{marginTop:6}}>
          <div className="f">Must have</div>
          {sr.must_have.slice(0,6).map((r,i)=>
            <div className="snip" key={i}>● {r}</div>)}</div>}
        {!!(sr.nice_to_have||[]).length && <div style={{marginTop:6}}>
          <div className="f">Nice to have</div>
          {sr.nice_to_have.slice(0,5).map((r,i)=>
            <div className="snip" key={i} style={{opacity:.75}}>
              ○ {r}</div>)}</div>}
        {!(sr.must_have||[]).length &&
          (j.requirements||[]).slice(0,5).map((r,i)=>
            <div className="snip" key={i}>{r}</div>)}
      </div>;})}
    {!jobs.length && <p className="sub">No jobs yet.</p>}
  </div>;

/* ---------------- Matches ---------------- */
function Matches({notify}){

  useEffect(()=>{ (async()=>{
    try{ setM(await api("/matches")); }catch(e){ notify(e.message); } })(); },[]);
  async function detail(id){
    try{ setOpen(await api("/matches/"+id)); }catch(e){ notify(e.message); } }
  const band=s=>s>=70?"var(--green)":s>=40?"var(--orange)":"var(--red)";
  return <div>
    <h1>Job Matches</h1>
    <p className="sub">Each job scored 0–100 against your strategy and
      approved evidence. Ranking is by that score only. Open one for the
      full “why this score”, with the exact evidence behind every point.</p>
    {m.map(x=>{ const j=x.job||x; const sg=x.semantic;
      return <div className="card" key={j.id}>
        <div className="row" style={{justifyContent:"space-between"}}>
          <b>{j.title} — {j.company}</b>
          <span className="pill" style={{background:band(x.score)}}>
            {x.score}/100</span>
        </div>
        {sg && <div style={{fontSize:11.5,color:"var(--sub)",
          marginTop:4}}>
          Secondary semantic signal ({sg.provider}):{" "}
          {Math.round(sg.similarity*100)}% — {sg.agreement}.{" "}
          <i>Does not affect the score or ranking.</i></div>}
        <button className="btn ghost mini" style={{marginTop:8}}
          onClick={()=>detail(j.id)}>Why this score?</button>
        {open && (open.job&&open.job.id)===j.id &&
          <div style={{marginTop:10}}>
            {(open.components||[]).map((c,i)=>{
              const frac=c.weight?c.earned/c.weight:0;
              return <div key={i} style={{marginBottom:10}}>
                <div className="kv" style={{border:0}}>
                  <span>{c.label||c.key}</span>
                  <span>{c.earned}/{c.weight}</span></div>
                <div className="bar"><i style={{width:
                  (100*Math.max(0,Math.min(1,frac)))+"%"}}></i></div>
                <div style={{fontSize:11.5,color:"var(--sub)"}}>
                  {c.detail}</div>
                {!!(c.evidence||[]).length &&
                  <div style={{marginTop:4,paddingLeft:8,
                    borderLeft:"2px solid var(--line)"}}>
                    {c.evidence.map((e,k)=>
                      <div key={k} style={{fontSize:11,
                        color:"var(--sub)"}}>↳ “{e.snippet}”</div>)}
                  </div>}
              </div>;})}
            {!!(open.matched_skills||[]).length &&
              <div style={{marginTop:6}}>{open.matched_skills.map((s,i)=>
                <span key={i} className="tag">✓ {s}</span>)}</div>}

      strategy, and import jobs.</p>}

}

/* ---------------- Packages (council + EXPORT) ---------------- */
function Packages({notify}){
  const [list,setList]=useState([]); const [jobs,setJobs]=useState([]);
  const [jid,setJid]=useState(""); const [sel,setSel]=useState(null);
  const [pkg,setPkg]=useState(null); const [run,setRun]=useState(null);
  const [busy,setBusy]=useState(false); const [edit,setEdit]=useState(null);
  const [draft,setDraft]=useState(""); const [load,setLoad]=useState(true);
  const [exFmt,setExFmt]=useState("md"); const [exArt,setExArt]=useState("both");
  const [exInc,setExInc]=useState(false); const [preview,setPreview]=useState(null);

  const loadList=useCallback(async()=>{
    try{ setList(await api("/packages"));
      const j=await api("/jobs"); setJobs(j);
      if(j[0]&&!jid) setJid(j[0].id);
    }catch(e){} finally{ setLoad(false); }
  },[jid]);
  useEffect(()=>{ loadList(); },[]);

  const openPkg=async(id)=>{
    setSel(id); setRun(null); setPreview(null);
    try{ setPkg(await api("/packages/"+id)); }catch(e){ notify(e.message); }
  };
  async function build(){
    if(!jid){ notify("Pick a job first"); return; }
    setBusy(true);
    try{ const p=await api("/packages",{method:"POST",
      body:JSON.stringify({job_id:jid})});
      notify("Package built — review each bullet's provenance");
      await loadList(); openPkg(p.id);
    }catch(e){ notify(e.message); } finally{ setBusy(false); }
  }
  async function act(b,body){
    try{ await api("/packages/"+sel+"/bullets/"+b.id,
      {method:"PATCH",body:JSON.stringify(body)});
      setEdit(null); setPkg(await api("/packages/"+sel)); setPreview(null);
    }catch(e){ notify(e.message); }
  }
  async function orchestrate(){
    setBusy(true);
    try{ const r=await api("/packages/"+sel+"/orchestrate",{method:"POST"});
      setRun(r); setPkg(await api("/packages/"+sel));
      notify(r.ready?"Council: READY to export":"Council: review the flags");
    }catch(e){ notify(e.message); } finally{ setBusy(false); }
  }
  async function loadPreview(){
    try{ setPreview(await api("/packages/"+sel+"/export/preview"+
      (exInc?"?include_unsupported=true":""))); }
    catch(e){ notify(e.message); }
  }
  function doExport(){
    const url=API+"/packages/"+sel+"/export?format="+exFmt+
      "&artifact="+exArt+"&include_unsupported="+exInc;
    window.open(url,"_blank");
    notify("Exporting "+exArt+" as "+exFmt.toUpperCase()+
      (exInc?" (unsupported INCLUDED — your override)":
             " — unsupported/rejected excluded"));
  }

  if(load) return <div className="spin">Loading…</div>;
  const SECT=[["summary","Summary"],["experience","Experience"],
    ["skills","Skills"],["cover_letter","Cover letter"]];

  return <div>
    <h1>Package Workspace</h1>
    <p className="sub">Every bullet is colour-coded by provenance and traces
      to an approved claim. Templated connectives are honestly marked
      AI-suggested (orange). Export excludes rejected / unsupported by
      default.</p>

    <div className="card">
      <label className="f">Build a package from a job</label>
      <div className="row">
        <select style={{maxWidth:420}} value={jid}
          onChange={e=>setJid(e.target.value)}>
          {jobs.map(j=><option key={j.id} value={j.id}>
            {j.title} — {j.company}</option>)}
        </select>
        <button className="btn" disabled={busy} onClick={build}>Build package</button>
      </div>
      {!!list.length && <div className="row" style={{marginTop:10}}>
        {list.map(p=><button key={p.id}
          className={"btn mini "+(sel===p.id?"":"sec")}
          onClick={()=>openPkg(p.id)}>{p.title} ({p.score_snapshot})</button>)}
      </div>}
    </div>

    {pkg && <div>
      <div className="card">
        <div className="row" style={{justifyContent:"space-between"}}>
          <b>{pkg.title} — {pkg.company}</b>
          <span className="pill" style={{background:"var(--accent)"}}>
            fit {pkg.score_snapshot}/100 · {pkg.status}</span>
        </div>
        <div className="row" style={{marginTop:10}}>
          <button className="btn sec" disabled={busy}
            onClick={orchestrate}>Run agent council (13 steps)</button>
        </div>
        {run && <div className="note">
          Council {run.ready?"READY ✓":"flagged ⚠"} — {run.summary}
          <div style={{marginTop:6}}>
            {(run.critiques||[]).map((c,i)=>
              <div key={i} style={{fontSize:11.5}}>
                <b>{c.agent}</b> [{c.severity}] {c.message||c.note}</div>)}
          </div>
        </div>}
      </div>

      {/* ---- EXPORT PANEL (new in Trust + Export slice) ---- */}
      <div className="card" style={{borderColor:"var(--accent)"}}>
        <div className="sec-h" style={{color:"var(--accent)"}}>Export</div>
        <div className="row">
          <div><label className="f">Format</label>
            <select value={exFmt} onChange={e=>setExFmt(e.target.value)}>
              <option value="md">Markdown</option>
              <option value="html">HTML</option>
              <option value="docx">DOCX (Word)</option>
              <option value="pdf">PDF</option>
              <option value="ats">ATS-safe (plain text)</option>
            </select></div>
          <div><label className="f">Artifact</label>
            <select value={exArt} onChange={e=>setExArt(e.target.value)}>
              <option value="resume">Résumé</option>
              <option value="cover_letter">Cover letter</option>
              <option value="both">Both</option>
            </select></div>
          <div style={{alignSelf:"flex-end",paddingBottom:2}}>
            <label style={{fontSize:12,color:"var(--sub)"}}>
              <input type="checkbox" style={{width:"auto",marginRight:6}}
                checked={exInc} onChange={e=>setExInc(e.target.checked)}/>
              include unsupported (override)</label>
          </div>
        </div>
        <div className="row" style={{marginTop:12}}>
          <button className="btn" onClick={doExport}>
            Download {exArt} · {exFmt.toUpperCase()}</button>
          <button className="btn sec" onClick={loadPreview}>Preview gate</button>
          <button className="btn sec" onClick={async()=>{
            try{ const a=await api("/applications",{method:"POST",
              body:JSON.stringify({package_id:sel})});
              notify("Tracking started — see the Tracker tab (status: "
                +a.status+"). Aptiro never submits for you.");
            }catch(e){ notify(e.message); } }}>
            Track this application</button>
        </div>
        {!exInc && <div className="note">
          Rejected, do-not-use, red, and unsupported-metric content is
          excluded from this export by default. Tick the override only if
          you accept the risk.</div>}
        {exInc && <div className="note" style={{borderColor:"var(--orange)",
          color:"var(--orange)"}}>Override ON — unsupported/rejected content
          WILL be included. Not recommended.</div>}
        {preview && <div className="note">
          <b>Included:</b> {Object.entries(preview.sections)
            .filter(([k,v])=>v.length).map(([k,v])=>k+" ("+v.length+")")
            .join(", ")||"nothing"}<br/>
          <b>Excluded ({preview.excluded.length}):</b>{" "}
          {preview.excluded.length
            ? preview.excluded.map((x,i)=>
                <div key={i} style={{fontSize:11.5,marginTop:3}}>
                  • [{x.section}] {x.text.slice(0,60)}… —
                  <i> {x.reasons.join("; ")}</i></div>)
            : "none"}
        </div>}
      </div>

      {SECT.map(([k,lbl])=>{
        const bs=(pkg.bullets||[]).filter(b=>b.section===k);
        if(!bs.length) return null;
        return <div className="card" key={k}>
          <div className="sec-h">{lbl}</div>
          {bs.map(b=>
            <div key={b.id} style={{borderLeft:"4px solid "+
              (PHEX[b.live_color||b.provenance_color]||"#ef4444"),
              padding:"6px 0 6px 12px",margin:"8px 0"}}>
              <div className="row" style={{justifyContent:"space-between"}}>
                <Prov color={b.live_color||b.provenance_color}
                  label={b.live_provenance||b.provenance}/>
                <span style={{fontSize:11.5,color:"var(--sub)"}}>
                  {b.status}{b.unsupported_metrics &&
                    b.unsupported_metrics.length?
                    " · ⚠ unsupported metric":""}</span>
              </div>
              {edit===b.id
                ? <div style={{marginTop:6}}>
                    <textarea value={draft}
                      onChange={e=>setDraft(e.target.value)}/>
                    <div className="row" style={{marginTop:6}}>
                      <button className="btn mini" onClick={()=>
                        act(b,{current_text:draft})}>Save rewrite</button>
                      <button className="btn mini sec"
                        onClick={()=>setEdit(null)}>Cancel</button>
                    </div>
                  </div>
                : <p style={{margin:"6px 0"}}>{b.current_text}</p>}
              {b.rationale && <div style={{fontSize:11,
                color:"var(--sub)"}}>{b.rationale}</div>}
              <div className="row" style={{marginTop:6}}>
                <button className="btn mini"
                  onClick={()=>act(b,{status:"accepted"})}>Accept</button>
                <button className="btn mini sec" onClick={()=>{
                  setEdit(b.id);setDraft(b.current_text);}}>Rewrite</button>
                <button className="btn ghost mini"
                  onClick={()=>act(b,{status:"locked"})}>Lock</button>
                <button className="btn ghost mini"
                  onClick={()=>act(b,{status:"rejected"})}>Reject</button>
              </div>
            </div>)}
        </div>;})}
    </div>}
    {!pkg && !load && <p className="sub">Build or open a package above.</p>}
  </div>;
}

/* ---------------- Apply (guarded scaffolding) ---------------- */
function Apply({notify}){
  const [pkgs,setPkgs]=useState([]); const [pid,setPid]=useState("");
  const [s,setS]=useState(null);
  useEffect(()=>{ (async()=>{
    try{ const p=await api("/packages"); setPkgs(p);
      if(p[0]) setPid(p[0].id); }catch(e){} })(); },[]);
  async function start(){
    try{ setS(await api("/apply",{method:"POST",
      body:JSON.stringify({package_id:pid})})); }
    catch(e){ notify(e.message); }
  }
  async function advance(action,confirm){
    try{ const body={action}; if(confirm!==undefined) body.confirm=confirm;
      setS(await api("/apply/"+s.id+"/advance",{method:"POST",
        body:JSON.stringify(body)}));
    }catch(e){ notify(e.message); }
  }
  return <div>
    <h1>Apply (guarded)</h1>
    <p className="sub">Scaffolding only. No browser automation, no CAPTCHA
      handling, nothing is ever submitted externally, and a human must
      explicitly confirm any simulated handoff.</p>
    <div className="card">
      <div className="row">
        <select style={{maxWidth:380}} value={pid}
          onChange={e=>setPid(e.target.value)}>
          {pkgs.map(p=><option key={p.id} value={p.id}>
            {p.title} — {p.company}</option>)}
        </select>
        <button className="btn" onClick={start}>Start session</button>
      </div>
      {s && <div style={{marginTop:12}}>
        <div className="kv"><span>State</span><b>{s.state}</b></div>
        <div className="note">{(s.guardrails||[]).map((g,i)=>
          <div key={i}>• {g}</div>)}</div>
        <div className="row" style={{marginTop:10}}>
          {(s.allowed_actions||[]).map(a=>
            <button key={a} className="btn mini sec"
              onClick={()=>advance(a, a==="confirm"?true:undefined)}>{a}</button>)}
        </div>
        {!!(s.history||[]).length && <div className="note">
          {s.history.map((h,i)=><div key={i}>{JSON.stringify(h)}</div>)}</div>}
      </div>}
    </div>
  </div>;
}

/* ---------------- Shell ---------------- */
function Tracker({notify}){
  const [apps,setApps]=useState([]); const [open,setOpen]=useState(null);
  const [snap,setSnap]=useState(null);
  const refresh=async()=>{ try{ setApps(await api("/applications")); }
    catch(e){ notify(e.message); } };
  useEffect(()=>{ refresh(); },[]);
  async function move(id,to){
    try{ await api("/applications/"+id+"/transition",
      {method:"POST",body:JSON.stringify({to})});
      notify("Status → "+to+" (recorded in history)"); refresh();
      if(open===id) viewSnap(id);
    }catch(e){ notify(e.status===409?
      "That transition isn't allowed from the current status.":e.message); }
  }
  async function viewSnap(id){
    setOpen(id);
    try{ setSnap(await api("/applications/"+id+"/snapshot")); }
    catch(e){ setSnap(null); }
  }
  async function reminderDone(id,rid){
    try{ await api("/applications/"+id+"/reminders/"+rid+"/done",
      {method:"POST"}); notify("Reminder marked done"); refresh();
    }catch(e){ notify(e.message); }
  }
  const SC={drafted:"var(--sub)",exported:"var(--accent)",
    submitted_by_user:"var(--green)",interviewing:"var(--orange)",
    offer:"var(--green)",rejected:"var(--red)",withdrawn:"var(--sub)"};
  return <div>
    <h1>Application Tracker</h1>
    <p className="sub">Track applications you submit yourself. Aptiro
      <b> never submits anything for you</b> — “submitted” is a status
      you set after applying on the employer’s own site. The moment you
      mark it submitted, an immutable snapshot of exactly what you sent
      is frozen as evidence.</p>
    {!apps.length && <p className="sub">No applications tracked yet —
      open a package and click “Track this application”.</p>}
    {apps.map(a=>
      <div className="card" key={a.id}>
        <div className="row" style={{justifyContent:"space-between"}}>
          <b>{a.job_title} — {a.company}</b>
          <span className="pill" style={{background:SC[a.status]||
            "var(--sub)"}}>{a.status.replace(/_/g," ")}</span>
        </div>
        <div className="row" style={{marginTop:8,flexWrap:"wrap"}}>
          {a.allowed_transitions.map(t=>
            <button key={t} className="btn ghost mini"
              onClick={()=>move(a.id,t)}>→ {t.replace(/_/g," ")}</button>)}
          {!a.allowed_transitions.length &&
            <span className="sub" style={{fontSize:12}}>terminal state</span>}
          <button className="btn ghost mini"
            onClick={()=>viewSnap(a.id)}>Snapshot &amp; history</button>
        </div>
        {!!(a.reminders||[]).length && <div style={{marginTop:8}}>
          {a.reminders.map(r=>
            <div key={r.id} className="kv" style={{border:0,
              opacity:r.done?.5:1}}>
              <span style={{fontSize:12}}>
                {r.done?"✓ ":"○ "}{r.message} ({r.offset_days}d)</span>
              {!r.done && <button className="btn ghost mini"
                onClick={()=>reminderDone(a.id,r.id)}>done</button>}
            </div>)}
        </div>}
        {open===a.id && <div style={{marginTop:10}}>
          <div className="f">History (audit log)</div>
          {(a.history||[]).map((h,i)=>
            <div key={i} className="snip" style={{fontSize:11.5}}>
              {(h.from||"·")} → {h.to}{h.note?" — "+h.note:""} ·{" "}
              {new Date(h.at).toLocaleString()}</div>)}
          {snap && snap.snapshot ? <div className="note"
            style={{marginTop:8}}>
            <b>Immutable snapshot</b> · sha {snap.snapshot_sha.slice(0,16)}…
            <div style={{fontSize:11.5,marginTop:4}}>
              Frozen {new Date(snap.snapshot.frozen_at).toLocaleString()};
              {" "}{Object.values(snap.snapshot.export_model.sections||{})
                .reduce((n,s)=>n+s.length,0)} line(s) of provenance-checked
              content captured exactly as sent.</div></div>
            : <div className="sub" style={{fontSize:12,marginTop:8}}>
              No snapshot yet — frozen only when you mark it submitted.</div>}
        </div>}
      </div>)}
  </div>;
}


function AuthScreen({onAuthed,notify}){

  const [name,setName]=useState(""); const [busy,setBusy]=useState(false);
  async function go(){
    if(!email||pw.length<8){ notify("Email + 8+ char password"); return; }
    setBusy(true);
    try{
      const ep = mode==="login"?"/auth/login":"/auth/register";
      const body = mode==="login"?{email,password:pw}
                                  :{email,password:pw,name};
      const r = await api(ep,{method:"POST",
        body:JSON.stringify(body)});
      setToken(r.token); onAuthed(r);
    }catch(e){ notify(e.message); }finally{ setBusy(false); }
  }
  return <div style={{maxWidth:380,margin:"80px auto"}}>
    <div className="brand" style={{fontSize:22,marginBottom:4}}>APTIRO
      <small>evidence-backed applications</small></div>
    <div className="card">
      <div className="row" style={{marginBottom:10}}>
        <button className={"btn "+(mode==="login"?"":"sec")}
          onClick={()=>setMode("login")}>Log in</button>
        <button className={"btn "+(mode==="register"?"":"sec")}
          onClick={()=>setMode("register")}>Register</button>
      </div>
      {mode==="register" && <><label className="f">Name</label>
        <input value={name} onChange={e=>setName(e.target.value)}/></>}
      <label className="f">Email</label>
      <input value={email} onChange={e=>setEmail(e.target.value)}
        placeholder="you@example.com"/>
      <label className="f">Password</label>
      <input type="password" value={pw}
        onChange={e=>setPw(e.target.value)} placeholder="8+ characters"/>
      <button className="btn" style={{marginTop:12,width:"100%"}}
        disabled={busy} onClick={go}>
        {mode==="login"?"Log in":"Create account"}</button>
    </div>
    <p className="sub" style={{textAlign:"center"}}>Your data is private
      to your account. Aptiro never submits anything for you.</p>
  </div>;
}

function App(){
  const [tab,setTab]=useState("dash");
  const [toast,setToast]=useState(null);
  const [boot,setBoot]=useState(null);   // null=loading
  const [me,setMe]=useState(null);
  const notify=(m)=>{ setToast(m); setTimeout(()=>setToast(null),4200); };
  useEffect(()=>{ (async()=>{
    try{
      const h = await api("/health");
      const authOn = h.auth && h.auth.enabled;
      if(!authOn){ setBoot("ready"); return; }
      try{ const m = await api("/auth/me");
        if(m && !m.is_default){ setMe(m); setBoot("ready"); }
        else setBoot("auth"); }
      catch(e){ setBoot("auth"); }
    }catch(e){ setBoot("ready"); }   // API down -> let views show errors
  })(); },[]);
  function logout(){ setToken(null); setMe(null); setBoot("auth"); }
  if(boot===null) return <div className="sub"
    style={{padding:40}}>Loading…</div>;
  if(boot==="auth") return <AuthScreen notify={notify}
    onAuthed={(u)=>{ setMe(u); setBoot("ready"); }}/>;
  const T={dash:Dashboard,vault:Vault,strategy:Strategy,jobs:Jobs,
    matches:Matches,packages:Packages,tracker:Tracker,apply:Apply,
    privacy:Privacy};
  const View=T[tab];
  const NAV=[["dash","Dashboard"],["vault","Profile Vault"],
    ["strategy","Strategy"],["jobs","Jobs"],["matches","Matches"],
    ["packages","Packages"],["tracker","Tracker"],["apply","Apply"],
    ["privacy","Privacy"]];
  return <div className="app">
    <div className="nav">
      <div className="brand">APTIRO
        <small>evidence-backed applications</small></div>
      {NAV.map(([k,l])=>
        <button key={k} className={tab===k?"on":""}
          onClick={()=>setTab(k)}>{l}</button>)}
      {me && <button onClick={logout} style={{marginTop:"auto"}}
        title={me.email}>Log out ({me.name||me.email})</button>}
    </div>
    <div className="main"><View go={setTab} notify={notify}/></div>
    {toast && <div className="toast">{toast}</div>}
  </div>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
