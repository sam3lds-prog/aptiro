# Aptiro — production target (Postgres + pgvector + built frontend).
# Local dev/test can still use zero-config SQLite (see README); this
# compose file is the production-shaped path.
#
#   docker compose up --build
#   UI  -> http://localhost:5173
#   API -> http://localhost:8000  (docs at /docs)
#
# Phase 7 (frontend foundation): the frontend service is now a multi-
# stage Node-build → nginx image. nginx reverse-proxies /api/* to the
# backend service, so the UI talks to it through a single origin.

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: aptiro
      POSTGRES_PASSWORD: aptiro
      POSTGRES_DB: aptiro
    ports:
      - "5432:5432"
    volumes:
      - aptiro_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aptiro -d aptiro"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      APTIRO_DATABASE_URL: postgresql+psycopg2://aptiro:aptiro@db:5432/aptiro
      APTIRO_AI_PROVIDER: mock          # deterministic default
      APTIRO_SEED_ON_STARTUP: "1"
      # To enable Anthropic instead, set:
      # APTIRO_AI_PROVIDER: anthropic
      # ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  aptiro_pgdata:
