name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    # Fix: opt in to Node.js 24 now to silence the Node 20 deprecation
    # warning and avoid forced migration on June 2 2026.
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run test suite
        working-directory: backend
        env:
          # Deterministic, offline, no credentials - exactly how the
          # suite is designed to run (mock providers, in-memory SQLite).
          APTIRO_AI_PROVIDER: mock
          APTIRO_EMBEDDING_PROVIDER: mock
          APTIRO_AUTH: "off"
        run: pytest -q
